{% set name = "gi-docgen" %}
{% set version = "2025.5" %}

package:
  name: "{{ name|lower }}"
  version: "{{ version }}"

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name.replace('-', '_') }}-{{ version }}.tar.gz
  sha256: 7fb2b5370d99849e52e74e9e584b7eeb5b5a3a95493d6752c88c0d251777f4bf

build:
  number: 0
  entry_points:
    - gi-docgen=gidocgen.gidocmain:main
  script: {{ PYTHON }} -m pip install . --no-deps --no-build-isolation --ignore-installed --no-cache-dir -vv
  skip: True  # [py<36]

requirements:
  host:
    - pip
    - setuptools
    - python
  run:
    - python
    - markdown >=3.2
    - markupsafe
    - pygments
    - typogrify
    - jinja2
    - packaging
    - tomli >=1,<3  # [py<311]

test:
  imports:
    - gidocgen
    - gidocgen.gir
    - gidocgen.core
    - gidocgen.gidocmain
  requires:
    - pip
  commands:
    - pip check
    - python -c "from importlib.metadata import version; assert(version('{{ name }}')=='{{ version }}')"
    - gi-docgen --help
    - test -f $PREFIX/share/pkgconfig/gi-docgen.pc  # [unix]
    - test -f $PREFIX/share/man/man1/gi-docgen.1    # [unix]
    - if not exist "%PREFIX%\\share\\pkgconfig\\gi-docgen.pc" exit /b 1  # [win]
    - if not exist "%PREFIX%\\share\\man\\man1\\gi-docgen.1" exit /b 1   # [win]

about:
  home: https://gitlab.gnome.org/GNOME/gi-docgen
  summary: Documentation tool for GObject-based libraries
  description: |
    GI-DocGen is a document generator for GObject-based libraries. GObject is
    the base type system of the GNOME project. GI-Docgen reuses the
    introspection data generated by GObject-based libraries to generate the API
    reference of these libraries, as well as other ancillary documentation.
  license: GPL-3.0-or-later AND Apache-2.0 AND CC0-1.0
  license_file: LICENSES/
  license_family: GPL
  doc_url: https://gitlab.gnome.org/GNOME/gi-docgen
  dev_url: https://gitlab.gnome.org/GNOME/gi-docgen

extra:
  recipe-maintainers:
    - leej3
